version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: builder/Dockerfile
    ports:
      - "${PORT:-4000}:4000"
    environment:
      PORT: "4000"
      DATABASE_PATH: /var/lib/jido_builder/jido_builder.db
      SECRET_KEY_BASE: "${SECRET_KEY_BASE:-change_me_in_production_min_64_chars_long_string_here_please}"
      PHX_HOST: "${PHX_HOST:-localhost}"
    volumes:
      - app_data:/var/lib/jido_builder
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/healthz"]
      interval: 30s
      timeout: 3s
      start_period: 15s
      retries: 3

  # Optional: Prometheus metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # Optional: Grafana dashboards
  grafana:
    image: grafana/grafana:10.4.0
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  app_data:
  prometheus_data:
  grafana_data:
